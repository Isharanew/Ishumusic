<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ishumusic</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(to bottom,#000,#111);
color:white;
}

nav{
display:flex;
justify-content:space-between;
padding:20px 40px;
background:rgba(0,0,0,0.7);
position:sticky;
top:0;
backdrop-filter:blur(10px);
border-bottom:1px solid #222;
}

nav h1{margin:0;font-size:26px}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
}

.hero{
display:flex;
flex-wrap:wrap;
justify-content:space-between;
align-items:center;
padding:80px 40px;
}

.hero h2{
font-size:50px;
margin:0;
}

.hero p{
color:#bbb;
max-width:400px;
}

.btn{
padding:12px 20px;
background:white;
color:black;
border:none;
border-radius:10px;
margin-top:15px;
cursor:pointer;
}

.section{
padding:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.card{
background:#161616;
border-radius:15px;
overflow:hidden;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card div{
padding:10px;
}

footer{
text-align:center;
padding:20px;
border-top:1px solid #222;
color:#888;
}
</style>

</head>

<body>

<nav>
<h1>🎵 Ishumusic</h1>
<div>
<a href="#">Home</a>
<a href="#music">Music</a>
<a href="#about">About</a>
</div>
</nav>

<section class="hero">
<div>
<h2>Feel The Beat</h2>
<p>Discover trending songs and premium music vibes in one place.</p>
<button class="btn">Play Now</button>
</div>

<img src="https://images.unsplash.com/photo-1496293455970-f8581aae0e3b?q=80&w=1200&auto=format&fit=crop"
style="width:100%;max-width:400px;border-radius:20px;">
</section>

<section id="music" class="section">
<h2>Trending Music</h2>

<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?q=80&w=1200&auto=format&fit=crop">
<div>Night Vibes</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1511379938547-c1f69419868d?q=80&w=1200&auto=format&fit=crop">
<div>Studio Beats</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1501612780327-45045538702b?q=80&w=1200&auto=format&fit=crop">
<div>Live Energy</div>
</div>

</div>
</section>

<section id="about" class="section">
<h2>About Ishumusic</h2>
<p style="color:#bbb">
Modern music platform for discovering trending songs, playlists and vibes.
</p>
</section>

<footer>
© 2026 Ishumusic - All Rights Reserved
</footer>

</body>
</html>
