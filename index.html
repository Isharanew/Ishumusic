/* GRID */
.section{

}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));

}

/* CARD */
.card{
background:#161616;
border-radius:15px;
overflow:hidden;
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:scale(1.08);

}

.card img{

}

.card div{

}

.player{

display:none;
gap:10px;

}

.player button{

<!-- HERO -->
<section class="hero">
<div>
<h1>Feel The Beat</h1>
<p>Discover trending songs and premium music vibes in one place.</p>
<button class="btn">Play Now</button>
</div>

<img src="https://images.unsplash.com/photo-1496293455970-f8581aae0e3b?q=80&w=1200&auto=format&fit=crop"
style="width:100%;max-width:400px;border-radius:20px;">
</section>

<!-- MUSIC -->
<section class="section">
<h2>Trending Music</h2>

<div class="grid">

<div class="card" onclick="playSong('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3','Night Vibes')">
<img src="https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?q=80&w=1200">
<div>Night Vibes</div>
</div>

<div class="card" onclick="playSong('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3','Studio Beats')">
<img src="https://images.unsplash.com/photo-1511379938547-c1f69419868d?q=80&w=1200">
<div>Studio Beats</div>
</div>

<div class="card" onclick="playSong('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3','Live Energy')">
<img src="https://images.unsplash.com/photo-1501612780327-45045538702b?q=80&w=1200">
<div>Live Energy</div>
</div>

</div>
</section>

<!-- PLAYER -->
<div class="player" id="player">
<span id="songName">Playing</span>
<button onclick="toggle()">Play/Pause</button>
<button onclick="closePlayer()">Close</button>
<audio id="audio"></audio>
</div>

<script>
let audio = document.getElementById("audio");
let player = document.getElementById("player");
let songName = document.getElementById("songName");

function playSong(src,name){
audio.src = src;
audio.play();
songName.innerText = name;
player.style.display = "flex";
}

function toggle(){
if(audio.paused){
audio.play();
}else{
audio.pause();
}
}

function closePlayer(){
audio.pause();
player.style.display = "none";
}

</script>
