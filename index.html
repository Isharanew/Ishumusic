<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>මගේ ලස්සන වෙබ් අඩවිය</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            text-align: center;
        }
        header {
            background-color: #333;
            color: white;
            padding: 20px;
            font-size: 24px;
        }
        .container {
            padding: 20px;
        }
        .main-image {
            width: 80%;
            max-width: 800px;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            margin-top: 20px;
        }
        .description {
            font-size: 18px;
            color: #555;
            margin: 20px;
        }
        footer {
            background-color: #333;
            color: white;
            padding: 10px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>

<header>
    මගේ නිර්මාණාත්මක වෙබ් අඩවිය
</header>

<div class="container">
    <h2>සාදරයෙන් පිළිගන්නවා!</h2>
    <p class="description">මෙය පින්තූර සහ නවීන පෙනුමකින් යුත් මගේ වෙබ් අඩවියයි.</p>
    
    <img src="https://picsum.photos/800/400" alt="ලස්සන පින්තූරයක්" class="main-image">
    
    <p class="description">ඔයාට අවශ්‍ය ඕනෑම විස්තරයක් මෙතන ඇතුළත් කරන්න පුළුවන්.</p>
</div>

<footer>
    © 2026 නිර්මාණය කළේ මමයි
</footer>

</body>
</html>
